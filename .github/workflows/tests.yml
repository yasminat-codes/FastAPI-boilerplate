name: Tests

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install uv
      run: pip install uv

    - name: Install project and dev toolchain
      run: uv sync --frozen --group dev

    - name: Run tests
      run: uv run pytest
      env:
        ENVIRONMENT: local
        SECRET_KEY: test-secret-key-for-testing-only
