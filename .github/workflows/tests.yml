name: Tests

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: local
      SECRET_KEY: test-secret-key-at-least-32-characters-long-for-ci
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/test_fastapi_template
      TEST_REDIS_HOST: 127.0.0.1

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_fastapi_template
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_fastapi_template"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      run: pip install uv

    - name: Install project and dev toolchain
      run: uv sync --frozen --group dev

    - name: Run tests with coverage
      run: uv run pytest --cov=src --cov-report=xml --cov-report=term-missing

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
        retention-days: 30
